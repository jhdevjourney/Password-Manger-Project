<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager - Secure Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Welcome Animation Screen -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-content">
            <div class="welcome-icon">🔐</div>
            <h2>Password Manager</h2>
            <p>Secure password storage</p>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🔐 Password Manager</h1>
            <p>Secure local password storage</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Add Password Section -->
            <section class="add-password-section">
                <h2>Add New Password</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="serviceName">Service/Website Name</label>
                        <input 
                            type="text" 
                            id="serviceName" 
                            placeholder="e.g., Gmail, GitHub, Netflix"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="username">Username/Email</label>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Your username or email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-group">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Enter password"
                                required
                            >
                            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility()">👁️</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes (Optional)</label>
                        <textarea 
                            id="notes" 
                            placeholder="Add any notes about this password"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Password</button>
                </form>
            </section>

            <!-- Passwords List Section -->
            <section class="passwords-section">
                <div class="section-header">
                    <h2>Your Passwords</h2>
                    <button onclick="clearAllPasswords()" class="btn btn-danger btn-small">Clear All</button>
                </div>

                <div id="passwordsList" class="passwords-list">
                    <p class="empty-state">No passwords saved yet. Add one above!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>💾 All passwords are encrypted and stored locally on your device</p>
        </footer>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
